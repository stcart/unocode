services:
  postgres:
    image: postgres:16-alpine
    container_name: praktika-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: praktika
      POSTGRES_PASSWORD: praktika
      POSTGRES_DB: praktika
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praktika -d praktika"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: praktika-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://praktika:praktika@postgres:5432/praktika?schema=public
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
    volumes:
      - backend_uploads:/app/uploads
      - ./backend/templates:/app/templates:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: praktika-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
