services:
  postgres:
    image: postgres:16-alpine
    container_name: praktika-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: praktika
      POSTGRES_PASSWORD: praktika
      POSTGRES_DB: praktika
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praktika -d praktika"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
